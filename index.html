<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
	</head>
	<body>
		<button type="button" id="start">开始</button>
		<button type="button" id="remove">重新加载</button>
		<script>
			//创建地图
			function Map(){
				this.width=800;
				this.height=400;
				this.position='relative';
				this.bGcolor='#ccc';
				this._map=null;
				this._idName="map";
			}
			Map.prototype.init=function(){
				this._map=document.createElement("div");
				this._map.style.width=this.width+"px";
				this._map.style.height=this.height+"px";
				this._map.style.position=this.position;
				this._map.style.backgroundColor=this.bGcolor;
				this._map.id=this._idName;
				document.body.appendChild(this._map);
			}
			// 创建食物
			function Food(){
				this.width=20;
				this.height=20;
				this.position="absolute";
				this.bGcolor="green";
				this.map=document.getElementById("map");
				this.oFood=null;
				this.x=10;
				this.y=0;
			}
			Food.prototype.init = function(){
				if(this.oFood==null){
					this.oFood=document.createElement("div");
					this.oFood.style.width=this.width+"px";
					this.oFood.style.height=this.height+"px";
					this.oFood.style.position=this.position;
					this.oFood.style.backgroundColor=this.bGcolor;
					this.map.appendChild(this.oFood);
				}
				this.x=Math.floor(Math.random()*40);
				this.y=Math.floor(Math.random()*20);
				this.oFood.style.left=this.x*20+"px";
				this.oFood.style.top=this.y*20+"px";
			}
			// 蛇
			function Snake(food){
				this.width=20;
				this.height=20;
				this.position="absolute";
				this.timer=null;
				this.num=0;
				this.direct = "right";
				this.food=food;
				this.map=document.getElementById("map");
				this.body=[
					// [x,y,颜色,div对象]
					[3,1,"red",null],
					[2,1,"blue",null],
					[1,1,"blue",null]
				]
			}
			Snake.prototype.run=function(){
				var that=this;
				// 1显示蛇
				this.show();
				// 2蛇移动->a.吃食物,b.游戏结束
				this.timer=setInterval(function(){
					that.move();
				},500)
				// 3蛇控制方向
				document.onkeydown=function(ev){
					var ev=ev||event;
					that.setDirect(ev.keyCode);
				}
			}
			Snake.prototype.show = function(){
				var len=this.body.length
				for(var i=0;i<len;i++){
					if(this.body[i][3]==null){
						this.body[i][3]=document.createElement("div");
						this.body[i][3].style.width=this.width+"px";
						this.body[i][3].style.height=this.height+"px";
						this.body[i][3].style.position=this.position;
						this.body[i][3].style.backgroundColor=this.body[i][2];
						this.map.appendChild(this.body[i][3]);
						
					}
					this.body[i][3].style.left=this.body[i][0]*20+"px";
					this.body[i][3].style.top=this.body[i][1]*20+"px";
				}
			}
			Snake.prototype.move=function(){
				var len1=this.body.length;
				for(var i=len1-1;i>0;i--){
					this.body[i][0]=this.body[i-1][0];
					this.body[i][1]=this.body[i-1][1];
				}
				// 设置方向
				// this.body[0][0] += 1
				// if(this.direct=="left"){
				// 	this.body[0][0] -= 1
				// }
				// if(this.direct=="top"){
				// 	this.body[0][1] -= 1
				// }
				// if(this.direct=="right"){
				// 	this.body[0][0] += 1
				// }
				// if(this.direct=="down"){
				// 	this.body[0][1] += 1
				// }
				switch(this.direct){
					case 'left':
						this.body[0][0] -= 1;
						break;
					case 'top':
						this.body[0][1] -= 1;
						break;
					case 'right':
						this.body[0][0] += 1;
						break;
					case 'down':
						this.body[0][1] += 1;
						break;
				}
				// 吃食物
				if(this.body[0][0]===this.food.x && this.body[0][1]===this.food.y){
					var len=this.body.length;
					var x=this.body[len-1][0];
					var y=this.body[len-1][1];
					this.body.push([x,y,"blue",null]);
					this.num++;
					document.title=this.num;
					this.food.init()
				}
				// GAME OVER
				if(this.body[0][0]<0||this.body[0][0]>39||this.body[0][1]<0||this.body[0][1]>19){
					clearInterval(this.timer)
					alert("GAME OVER")
					return
				}
				this.show();
			}
			Snake.prototype.setDirect=function(keycode){
				switch(keycode){
					case 37:
						this.direct="left";
						break;
					case 38:
						this.direct="top";
						break;
					case 39:
						this.direct="right";
						break;
					case 40:
						this.direct="down";
						break;
				}
			}
			
			var oStart=document.getElementById("start")
			var oRemove=document.getElementById("remove")
			oStart.onclick=function(){
				var map=new Map();
				map.init();
				var food=new Food();
				food.init();
				var snake=new Snake(food);
				snake.run();
				this.disabled="true"
			}
			oRemove.onclick=function(){
				window.location.reload();

			}
		</script>
		
	</body>
</html>
